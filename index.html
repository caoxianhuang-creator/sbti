<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博人格测试 SBTI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFF8F0;
      --card: #FFFFFF;
      --card2: #FFF0E8;
      --primary: #FF6B6B;
      --primary-light: #FFF0F0;
      --secondary: #00C9A7;
      --accent: #FFD93D;
      --purple: #A78BFA;
      --orange: #FF9F43;
      --text: #2D3436;
      --text-dim: #8B8B9A;
      --border: #FFE8D6;
      --shadow: 0 4px 24px rgba(255,107,107,0.08);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideIn { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
    @keyframes popIn { 0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
    @keyframes barFill { from { width:0% } }

    .container { width: 100%; max-width: 520px; padding: 0 20px; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.4s ease; }

    /* ===== START SCREEN ===== */
    #start-screen { text-align: center; padding: 40px 20px; animation: fadeUp 0.6s ease; }
    .logo-emoji { font-size: 56px; margin-bottom: 16px; }
    .logo-sub { font-size: 11px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; }
    .main-title { font-size: clamp(48px, 14vw, 72px); font-weight: 900; line-height: 1; margin-bottom: 8px; }
    .title-sbti {
      background: linear-gradient(135deg, #FF6B6B, #FF9F43, #FFD93D);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
    .title-year { font-size: 14px; color: var(--text-dim); font-weight: 400; }
    .subtitle { font-size: 15px; color: var(--text-dim); margin: 20px 0 36px; line-height: 1.7; }
    .start-btn {
      padding: 16px 56px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
      color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,107,107,0.3);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,107,0.4); }
    .start-btn:active { transform: scale(0.97); }
    .stats-row { display: flex; justify-content: center; gap: 32px; margin-top: 36px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FF6B6B, #FF9F43); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .disclaimer { margin-top: 28px; font-size: 11px; color: var(--text-dim); line-height: 1.7; }

    /* ===== QUESTION SCREEN ===== */
    #question-screen { padding: 24px 20px 48px; }
    .q-progress { margin-bottom: 28px; }
    .q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .q-counter { font-size: 13px; color: var(--text-dim); }
    .q-counter span { color: var(--primary); font-weight: 700; }
    .q-dim-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary); font-weight: 600;
    }
    .progress-track { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B6B, #FF9F43, #FFD93D);
      border-radius: 2px; transition: width 0.4s ease;
    }
    .q-card { background: var(--card); border-radius: 24px; padding: 36px 24px; animation: slideIn 0.3s ease; box-shadow: var(--shadow); }
    .q-text { font-size: 19px; font-weight: 600; line-height: 1.55; margin-bottom: 28px; color: var(--text); }
    .q-opts { display: flex; flex-direction: column; gap: 10px; }
    .q-opt {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; background: var(--bg); border: 2px solid var(--border);
      border-radius: 16px; color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; text-align: left;
    }
    .q-opt:hover { border-color: var(--primary); background: var(--primary-light); transform: translateX(3px); }
    .q-opt:active { transform: scale(0.98); }
    .q-opt-letter {
      width: 32px; height: 32px; border-radius: 10px;
      background: var(--card2); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; flex-shrink: 0; transition: background 0.2s;
    }
    .q-opt:hover .q-opt-letter { background: var(--primary); color: white; }

    /* ===== RESULT SCREEN ===== */
    #result-screen { padding: 28px 20px 48px; text-align: center; animation: fadeIn 0.5s ease; }
    .result-badge { animation: fadeUp 0.5s ease 0.05s both; margin-bottom: 8px; }
    .result-eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
    .result-type-badge {
      display: inline-block; padding: 8px 20px; border-radius: 50px;
      font-size: 13px; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(135deg, #FF6B6B, #FF9F43); color: white; margin-bottom: 8px;
    }
    .result-main-type {
      font-size: clamp(56px, 16vw, 80px); font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #FF6B6B, #FF9F43, #FFD93D);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite; margin: 8px 0;
    }
    .result-name { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .result-tagline { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.6; }
    .result-divider { width: 60px; height: 3px; background: linear-gradient(90deg, #FF6B6B, #FFD93D); border-radius: 2px; margin: 0 auto 24px; }

    /* Cards */
    .result-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); text-align: left; animation: fadeUp 0.5s ease 0.1s both; }
    .card-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .card-title .icon { font-size: 16px; }

    /* Traits */
    .trait-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .trait-chip {
      padding: 5px 14px; border-radius: 50px; font-size: 12px; font-weight: 600;
      border: 1.5px solid; transition: all 0.2s;
    }

    /* Career */
    .career-list { display: flex; flex-direction: column; gap: 8px; }
    .career-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--bg); border-radius: 12px;
      font-size: 13px; color: var(--text);
    }
    .career-item .c-icon { font-size: 18px; flex-shrink: 0; }
    .career-item .c-name { font-weight: 600; }
    .career-item .c-reason { color: var(--text-dim); font-size: 12px; }

    /* Share */
    .share-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #00C9A7, #00E5C4);
      color: white; border: none; border-radius: 16px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,201,167,0.25); margin-bottom: 10px;
    }
    .share-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,201,167,0.35); }
    .replay-btn {
      width: 100%; padding: 14px; background: transparent; color: var(--text-dim);
      border: 1.5px solid var(--border); border-radius: 16px; font-size: 14px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-bottom: 24px;
    }
    .replay-btn:hover { border-color: var(--primary); color: var(--primary); }
    .result-footer { font-size: 11px; color: var(--text-dim); line-height: 1.8; text-align: center; }

    /* Responsive */
    @media (max-width: 400px) {
      .stats-row { gap: 20px; }
      .stat-num { font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- START -->
<div id="start-screen" class="screen active">
  <div class="container">
    <div class="logo-emoji">🎭</div>
    <div class="logo-sub">// 赛博人格测试 //</div>
    <div class="main-title">
      <div class="title-sbti">SBTI</div>

  </div>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">

</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="container">
    <div class="result-badge">

      <div class="result-type-badge" id="resBadge">ESTPA</div>

    <div class="result-main-type" id="resName">卷王</div>
    <div class="result-tagline" id="resTagline">说做就做，不负当下</div>
    <div class="result-divider"></div>

    <div class="result-card" id="traitCard">
      <div class="card-title"><span class="icon">🏷️</span> 特质标签</div>
      <div class="trait-chips" id="resChips"></div>
    </div>

    <div class="result-card" id="descCard">
      <div class="card-title"><span class="icon">📝</span> 人格解读</div>
      <div class="desc-text" id="resDesc" style="font-size:14px;color:var(--text-dim);line-height:1.9"></div>
    </div>

    <div class="result-card" id="careerCard">
      <div class="card-title"><span class="icon">💼</span> 职业发展建议</div>
      <div class="career-list" id="careerList"></div>
    </div>

    <button class="share-btn" id="shareBtn">📤 复制结果发给好友</button>
    <button class="replay-btn" id="replayBtn">↻ 再测一次</button>
    <div class="result-footer">
      本测试仅供娱乐 · 请勿当真 · 认真你就输了<br>
      欢迎分享给冤种朋友们 · @刷鞋大王
    </div>
  </div>
</div>

  { d:0, q:"周末你通常在干嘛？", a:[{l:"A",t:"出门浪，见人，充电"},{l:"B",t:"在家躺着，哪也不去"}] },
  { d:0, q:"聊天时你是先打字还是等对方回？", a:[{l:"A",t:"我先开口，主动破冰"},{l:"B",t:"等对方先说，我再接"}] },

  { d:1, q:"你喜欢什么样的内容？", a:[{l:"A",t:"实操干货，有步骤有方法"},{l:"B",t:"有深度的分析和洞察"}] },

var TYPES = {
  "ESTPA": { name:"卷王", tagline:"永不停歇的卷王本王", desc:"你是朋友圈里的发动机。别人休息你在卷，别人睡觉你还在卷。卷是你的本能，不卷才是异常。你是那种让同事感到压力的卷王（褒义），也是团队里永远可以依靠的存在。你的动力源源不断，效率奇高，是天生的工作狂人。但记得偶尔也要停下来，毕竟身体是革命的本钱。你的行动力是你最大的武器，也是最容易让你透支的原因。在感情中，你可能也会不自觉地用「完成任务」的方式来表达关心，容易忽略对方的情感需求。建议学会放慢脚步，享受过程而非只盯着结果。", traits:[{t:"卷王",c:"#FF6B6B"},{t:"行动派",c:"#FF9F43"},{t:"高目标",c:"#FFD93D"},{t:"高效",c:"#A78BFA"}], careers:[{icon:"💻",name:"产品经理",reason:"统筹全局，卷到极致"},{icon:"📊",name:"数据分析师",reason:"擅长量化，逻辑清晰"},{icon:"🎯",name:"创业者",reason:"All in全压，不留退路"},{icon:"🏋️",name:"销售总监",reason:"战斗状态永不掉线"},{icon:"📈",name:"投资经理",reason:"高压力高回报匹配你的节奏"}] },
  "ESTPC": { name:"硬刚王", tagline:"遇到困难直接上", desc:"遇到困难直接上，从不绕路。管你是谁，管你什么规则，硬刚到底。输赢不重要，气势不能输。你是那种让人又敬又怕的存在。在职场中，你是那个永远敢于对不公说「不」的人，你的勇气和魄力是稀缺的品质。但有时候太过刚硬会让自己四面树敌，学会在坚持原则和灵活变通之间找到平衡点，是你的必修课。你对自己要求极高，对别人也一样，这种标准让你们团队的上限很高，但人际关系可能需要多花心思维护。在感情里，你是那个护短到底的人，但表达方式可能过于直接，别让刀子嘴豆腐心伤了真正在乎你的人。", traits:[{t:"硬刚",c:"#FF6B6B"},{t:"不妥协",c:"#E74C3C"},{t:"战斗欲",c:"#FF9F43"},{t:"强势",c:"#C0392B"}], careers:[{icon:"⚖️",name:"律师",reason:"硬刚到底，不服来辩"},{icon:"🏛️",name:"公务员/监察",reason:"监督执行，刚正不阿"},{icon:"🛡️",name:"安保/法务",reason:"守护规则，寸步不让"},{icon:"📣",name:"公关负责人",reason:"硬气应对危机公关"},{icon:"👔",name:"职业经理人",reason:"强势管理，推动变革"}] },
  "ESTFA": { name:"乐观牛", tagline:"负面新闻当没看见", desc:"负面新闻？国际局势？别看了影响心情。你是朋友圈的阳光，空气净化器本人。跟你待久了会变傻，傻得很开心那种。你的乐观不是盲目，而是选择性地忽略那些无法改变的坏消息，专注于自己能控制的部分。这种能力在如今这个充满焦虑的时代是极其稀缺的天赋。你是朋友圈里的情绪稳定器，朋友有烦恼第一个想到你。但要注意，你的乐观有时会变成逃避问题的借口——不是所有事情都可以靠「想开点」解决，适当的时候也要正视压力和负面情绪。在感情中你是天生的开心果，但也别忽略了对方偶尔需要的「被认真倾听」。", traits:[{t:"乐观",c:"#FFD93D"},{t:"正能量",c:"#F39C12"},{t:"治愈系",c:"#00C9A7"},{t:"心大",c:"#27AE60"}], careers:[{icon:"🎨",name:"创意策划",reason:"点子多，乐观催生创造力"},{icon:"🌱",name:"品牌运营",reason:"传递温暖正向的品牌调性"},{icon:"🎓",name:"培训师/讲师",reason:"激励他人，乐观感染学员"},{icon:"☀️",name:"内容创作者",reason:"自媒体时代的阳光博主"},{icon:"🤝",name:"HR/员工关系",reason:"团队氛围的润滑剂"}] },
  "ESTFC": { name:"自由人", tagline:"卷了这么久，该休息了", desc:"卷了这么久，该休息了。躺平是人生哲学，放过自己才是第一要务。你的格言：差不多就行了，何必那么累。你不是真的懒，而是看透了内卷的本质选择主动退出竞争。这是一种很难得的自我觉醒，也是需要勇气的选择。你的生活方式可能是很多人羡慕但又不敢尝试的——敢于不被社会时钟推着走，本身就是一种成功。但要小心，躺平也需要资本，适当的储备和规划还是必要的。你是朋友中心态最好的那个，但也别让「无所谓」变成了对所有事情的漠不关心。在感情中你的随和让你们相处很轻松，但要记得有时候也需要主动表达和争取。", traits:[{t:"躺平",c:"#A78BFA"},{t:"反内卷",c:"#8B5CF6"},{t:"自洽",c:"#7C3AED"},{t:"松弛感",c:"#C4B5FD"}], careers:[{icon:"✍️",name:"自由撰稿人",reason:"时间自由，躺平写稿两不误"},{icon:"🎵",name:"独立音乐人",reason:"随性创作，拒绝工业流水线"},{icon:"🌿",name:"旅行博主",reason:"边躺边玩，以旅行为生"},{icon:"☕",name:"咖啡馆老板",reason:"小而美，做自己喜欢的事"},{icon:"📷",name:"独立摄影师",reason:"接单自由，拒绝卷价格战"}] },
  "ESNPA": { name:"社牛卷王", tagline:"人脉就是钱脉", desc:"人脉就是钱脉，你深谙此道。吃饭要拍照，拍照要发圈，发圈要@人。卷和社交两不误，卷王中的战斗机。你是朋友圈里的社交天花板，走到哪里都是焦点。你的Networking能力是天生的优势，在需要整合资源、搭建人脉的岗位上有着无可比拟的天赋。但要小心别让社交变成了表演——真正有价值的人脉是建立在真诚互惠的基础上的，不是简单的点赞之交。另外，你的精力分配也需要注意：社交虽好，别忘了留点时间给自己思考和沉淀。在感情中你是主动型，但有时候太忙着拓展圈子可能会忽略了身边真正重要的人。", traits:[{t:"社牛",c:"#FF9F43"},{t:"卷王",c:"#FF6B6B"},{t:"人脉王",c:"#E67E22"},{t:"控场",c:"#F39C12"}], careers:[{icon:"🤝",name:"商务拓展BD",reason:"人脉变现场，资源整合者"},{icon:"📱",name:"网红/MCN运营",reason:"社牛+内容，天选流量人"},{icon:"🏢",name:"活动策划",reason:"整合资源，搞定各种甲方"},{icon:"💼",name:"保险/理财顾问",reason:"社交即销售，人多就是金矿"},{icon:"🎪",name:"婚庆/主持人",reason:"社交场上的全能选手"}] },
  "ESNPC": { name:"社牛战士", tagline:"既能聊又能刚", desc:"既能聊又能刚，你是人群中的亮点。硬刚+社交牛杂质的结合体，所到之处，皆是战场也是秀场。你的适应能力极强，上能公开发言震慑全场，下能单独对话拿捏分寸，是难得的综合性人才。但你的「刚」有时候会显得有点攻击性，特别是在观点分歧时容易让气氛变僵。学会在坚持自己和照顾他人感受之间找到平衡，是你人际关系的进阶课。在感情中你是敢于表达的那一方，但有时候表达方式太冲容易好心办坏事——学会有话好好说，能让你们的关系少很多摩擦。", traits:[{t:"社牛",c:"#FF9F43"},{t:"硬刚",c:"#FF6B6B"},{t:"表达力",c:"#E91E63"},{t:"控场",c:"#FF5252"}], careers:[{icon:"🎤",name:"主持人/司仪",reason:"台上控场，台下应酬两不误"},{icon:"📢",name:"企业发言人",reason:"能说会道，关键时刻顶得上"},{icon:"🏛️",name:"商务谈判",reason:"既能喝酒又能硬刚条款"},{icon:"🎬",name:"脱口秀/相声演员",reason:"嘴皮子利索，刚需技能"},{icon:"📨",name:"客户成功经理",reason:"既要对客户刚，又要维稳关系"}] },
  "ESNFA": { name:"开心果", tagline:"气氛组组长", desc:"你是气氛组组长，乐观能量发射器。跟你待久了会变傻，傻得很开心那种。社交牛杂+乐观怪属性拉满。你的存在本身就是一种治愈——朋友难过的时候，你不需要说什么大道理，只要你在场，大家就会觉得事情没那么糟糕。但要注意，不是所有场合都需要你扮演「开心果」的角色，有时候对方需要的只是安静的陪伴，而不是你的乐观开导。另外，你也要小心别把「总是开心」变成了表演，真正的情绪表达和偶尔的脆弱也是健康人际关系的必要组成。在感情中你是天生的快乐制造机，但别让对方觉得你永远是那个「不需要被照顾」的人。", traits:[{t:"开心果",c:"#FF69B4"},{t:"社牛",c:"#FF9F43"},{t:"乐观",c:"#FFD93D"},{t:"感染力",c:"#27AE60"}], careers:[{icon:"🎭",name:"演员/主持人",reason:"舞台感染力，天生的主角光环"},{icon:"🎨",name:"儿童教育",reason:"快乐氛围受孩子喜欢"},{icon:"🏖️",name:"旅游体验师",reason:"把快乐分享成职业"},{icon:"🍹",name:"品牌大使/KOL",reason:"阳光人设，商家最爱"},{icon:"🎁",name:"活动策划/暖场",reason:"气氛担当，永远的破冰神器"}] },
  "ESNFC": { name:"躺平社牛", tagline:"社交满分，躺平至上", desc:"社交满分，躺平至上。能不出门绝不出门，能躺着绝不坐着。但一个电话来，你又在派对了。你是矛盾的综合体，但自洽得很。你拥有最理想的生活状态：线上社交游刃有余，线下能不动就不动。这不是懒，而是一种经过思考后的高效选择——用最小的社交成本维持最大的人际关系。但要注意，长期的被动社交可能会让你在真正需要主动出击的时刻失去动力。在感情中你是被动型的一方，但别让「被动」变成了「不在乎」——主动表达一次会让对方感动很久。你的躺平哲学有市场，但别让「差不多就行」侵蚀了你真正在乎的东西。", traits:[{t:"社牛",c:"#FF9F43"},{t:"躺平",c:"#A78BFA"},{t:"反差感",c:"#00BCD4"},{t:"自洽",c:"#7C3AED"}], careers:[{icon:"📱",name:"社交媒体运营",reason:"躺着也能运营百万账号"},{icon:"🎮",name:"游戏主播/代练",reason:"躺平+社交，两不耽误的完美工作"},{icon:"💬",name:"在线客服/陪聊",reason:"能躺着绝不坐着把钱赚了"},{icon:"📦",name:"电商/代购",reason:"线上社交驱动的小生意"},{icon:"🎧",name:"播客/电台主播",reason:"独处工作，社交发声两不误"}] },
  "EITPA": { name:"独狼卷", tagline:"一个人卷，安静地卷", desc:"一个人卷，安静地卷。你不需要观众，卷是为了自己。孤独是你最好的充电方式，沉默是你最强的武器。你可能是朋友圈里最努力的那个，但也是最低调的——你的卷从来不是为了给别人看，而是源于内心的自我要求。这让你在需要深度专注的领域有着天然的优势。但要注意，再独立的狼也需要同伴，适当的合作和交流能让你的能力放大N倍。学会借助他人的力量，而不是所有事情都自己扛，是从优秀到卓越的必经之路。在感情中你是沉默付出型，但别让对方觉得你「有没有都一样」——偶尔的表达和惊喜能让关系更稳固。", traits:[{t:"独狼",c:"#8B5CF6"},{t:"内卷",c:"#A78BFA"},{t:"专注",c:"#7C3AED"},{t:"独立",c:"#6D28D9"}], careers:[{icon:"🧪",name:"研究员/科学家",reason:"孤独求败，深度研究的天选之人"},{icon:"💰",name:"量化交易员",reason:"独自分析，闷声发大财"},{icon:"📝",name:"独立作家/翻译",reason:"一个人就是一支队伍"},{icon:"🎨",name:"独立设计师/艺术家",reason:"独处才能出好作品"},{icon:"🔬",name:"技术专家/架构师",reason:"安静写代码，卷死所有人"}] },
  "EITPC": { name:"硬刚独狼", tagline:"不需要队友", desc:"不需要队友，不需要建议。遇到问题一个人扛，扛不住就硬刚。你是孤岛上的战斗机，独立自主的代名词。你的毅力和抗压能力是所有人里最强的——只要是你认定的事情，没有任何困难能让你放弃。但你的独立有时会变成孤立无援，要记住，真正的强者不是所有事情都自己扛，而是知道什么时候该借力。学会开口求助，是你在职场和人际关系中都需要突破的瓶颈。在感情中你是完全独立的一方，但别让对方觉得自己不被需要——偶尔示弱和依赖，会让你们的关系更平等也更深入。", traits:[{t:"独狼",c:"#8B5CF6"},{t:"硬刚",c:"#FF6B6B"},{t:"独立",c:"#7C3AED"},{t:"固执",c:"#6D28D9"}], careers:[{icon:"🗡️",name:"独立开发者",reason:"一个人做出一款产品"},{icon:"⚔️",name:"律师/法律顾问",reason:"单打独斗也能赢案子"},{icon:"🛠️",name:"自由工程师",reason:"技术过硬，不需要团队背书"},{icon:"📊",name:"独立咨询师",reason:"专业能力是你最强的靠山"},{icon:"🎯",name:"独立投资人",reason:"自己的判断，不受他人干扰"}] },
  "EITFA": { name:"独行乐", tagline:"一个人也能很开心", desc:"一个人也能很开心？你就是答案。不依赖外界，自身就是快乐源泉。独处时你最强大，也最自在。你拥有一种稀有的能力——完全不依赖外界的认可来获得幸福感。这让你在独处时也能充实快乐，是真正内心强大的人。但要注意，独处的快乐不应该变成社交回避的借口——与人分享快乐，快乐会加倍；与人分担痛苦，痛苦会减半。学会在独处和社交之间找到平衡，是你的成长方向。在感情中你是最不容易感到孤独的一方，但也要注意，别让对方觉得「有你没有你都一样」——主动的关心和陪伴能让你们的关系更紧密。", traits:[{t:"独行",c:"#00C9A7"},{t:"自洽",c:"#00BCD4"},{t:"独立",c:"#27AE60"},{t:"自由",c:"#2ECC71"}], careers:[{icon:"🧘",name:"自由职业/数字游民",reason:"工作地点自由，随遇而安"},{icon:"🌏",name:"旅行体验师/背包客",reason:"一个人也能玩遍全世界"},{icon:"📚",name:"独立学者/撰稿人",reason:"沉下心来，做好自己的研究"},{icon:"🍳",name:"美食博主/探店达人",reason:"一个人也能吃出幸福感"},{icon:"🏊",name:"健身/户外教练",reason:"自律独行，不需要伴儿"}] },
  "EITFC": { name:"独行侠", tagline:"低质量社交不如没有", desc:"低质量社交不如没有，你信奉精英社交。朋友不在多，在于懂你。你是独行侠，大隐隐于市的那种。你的社交哲学非常成熟——宁可高质量独处，也不要低质量社交。这让你的人际关系质量极高，每一段关系都是真正有价值的。但在职场中，这种态度可能会让你错过一些必要的资源积累。学会区分「有效弱连接」和「低质量社交」，在保持初心的同时也能拓展人脉，是你的进阶课题。在感情中你是宁缺毋滥型，但别让「完美主义」变成了「不将就」——有时候缘分到了，就是那个人，不是完美的人。", traits:[{t:"独行",c:"#8B5CF6"},{t:"高冷",c:"#7C3AED"},{t:"精英社交",c:"#6D28D9"},{t:"挑剔",c:"#A78BFA"}], careers:[{icon:"🏛️",name:"高端定制服务",reason:"小众市场，精英客户"},{icon:"💎",name:"珠宝/艺术品鉴定",reason:"专业审美，圈子文化"},{icon:"🧳",name:"高端旅游定制师",reason:"服务少数人，深度体验"},{icon:"📖",name:"知识付费/KOL",reason:"用内容筛选精准受众"},{icon:"🍷",name:"品酒师/侍酒师",reason:"小众圈子，精英文化"}] },
  "ENNPA": { name:"社交元人", tagline:"人设包装大师", desc:"人设包装大师，朋友圈经营砖家。你的每条动态都是精心策划，每张照片都价值连城。影响力是你追求的货币。你深谙互联网传播的规律，知道什么样的人设能吸引什么样的人。这是一种稀缺的能力——你既是内容的生产者，也是内容的运营者。但要小心别让人设绑架了真实的自己——粉丝喜欢的是你展示的那个形象，但真正爱你的人应该爱你真实的样子。在算法时代，你的包装能力是巨大的优势，但也不要让流量成为衡量一切的标准。在感情中你是高调型，但别让「展示」成了关系的负担——真实的爱不需要包装。", traits:[{t:"大V",c:"#E67E22"},{t:"人设",c:"#FF9F43"},{t:"影响力",c:"#F39C12"},{t:"表演",c:"#E91E63"}], careers:[{icon:"📱",name:"博主/网红/KOL",reason:"影响力变现，流量即金钱"},{icon:"🎬",name:"MCN机构运营",reason:"包装达人，批量制造网红"},{icon:"📢",name:"品牌营销总监",reason:"人设即品牌，懂得用户心理"},{icon:"🎭",name:"艺人经纪",reason:"包装艺人是一门学问"},{icon:"📣",name:"广告创意总监",reason:"制造刷屏事件的高手"}] },
  "ENNPC": { name:"键盘侠", tagline:"网上重拳出击", desc:"网上重拳出击，线下岁月静好。你的键盘是你的武器，你的屏幕是你的战场。义正言辞是你战斗的姿态。你是互联网时代的评论家，有思想、有观点、不沉默。但要注意，「网上刚」和「线下刚」是两码事——现实中的关系维护和沟通方式与网上完全不同，不能用同一套逻辑处理。在网上你可以做战斗模式，在现实中建议切换成和解模式。另外，你的高正义感如果用在正确的方向，可以成为推动社会进步的力量，比如做消费者维权、社会议题倡导等。在感情中你可能会把网络上的习惯带进来——辩论赢了但感情输了，得不偿失。", traits:[{t:"键盘侠",c:"#E74C3C"},{t:"键政",c:"#C0392B"},{t:"战斗欲",c:"#FF5252"},{t:"正义感",c:"#9B59B6"}], careers:[{icon:"✍️",name:"时事评论员",reason:"键盘就是武器，评论就是力量"},{icon:"📣",name:"媒体记者/调查记者",reason:"挖掘真相，舆论监督"},{icon:"⚖️",name:"消费者维权律师",reason:"帮普通人对抗大公司"},{icon:"🛡️",name:"网络安全工程师",reason:"用技术手段解决网络乱象"},{icon:"🎯",name:"社群运营/舆论引导",reason:"引导正向舆论，化解危机"}] },
  "ENNFA": { name:"社牛乐观", tagline:"永远正能量", desc:"永远正能量，永远笑嘻嘻。悲观这种情绪跟你没关系，天塌下来有乐观顶着，你是朋友圈的人形暖宝宝。你的存在本身就是一种治愈力——朋友有烦恼时第一个想到你，因为你总能让事情看起来没那么糟。但要注意，你的乐观有时候会变成一种情感负担——朋友需要的可能只是有人陪着难过，而不是你不停地输出「往好处想」。学会倾听，而不是给建议；学会陪伴，而不是转移注意力——这是你人际关系更进一步的钥匙。在感情中你是天生的治愈系，但别让自己成为「永远的正能量提供者」——偶尔展示脆弱是关系的推进器，不是阻碍。", traits:[{t:"乐观",c:"#FFD93D"},{t:"社牛",c:"#FF9F43"},{t:"正能量",c:"#F39C12"},{t:"温暖",c:"#27AE60"}], careers:[{icon:"🤝",name:"销售/BD",reason:"乐观感染客户，成单率翻倍"},{icon:"🏥",name:"护士/心理咨询师",reason:"情绪稳定，治愈力强"},{icon:"🌱",name:"保险代理人",reason:"乐观推销，客户感受好"},{icon:"🎓",name:"教师/培训师",reason:"传递正能量，学生喜欢你"},{icon:"🐾",name:"宠物行业/宠物店员",reason:"每天接触可爱事物，保持快乐"}] },
  "ENNFC": { name:"人间清醒", tagline:"社交懒，低欲望", desc:"社交懒，低欲望，看透一切。你的心态稳如老狗，不争不抢不焦虑。人间清醒就是你的人生标签。你是朋友圈里活得最明白的那个——不是因为你做了什么特别的事，而是因为你选择了不被社会的KPI推着走。你的淡定来源于选择，而不是无奈。但要注意，这种「人间清醒」有时候会变成「人间冷漠」——不是所有事情都需要你保持距离，有的事情值得你投入和在乎。另外，你的低欲望如果到了影响生活动力的程度，也需要反思——真正的清醒是知道什么重要，然后去在乎它。在感情中你是最不会焦虑的一方，但别让对方觉得你对这段关系不在乎——主动表达是在乎的最直接证明。", traits:[{t:"清醒",c:"#95A5A6"},{t:"淡定",c:"#7F8C8D"},{t:"低欲望",c:"#ABB7B7"},{t:"通透",c:"#BDC3C7"}], careers:[{icon:"🏠",name:"民宿/长租公寓运营",reason:"不争不抢，稳健经营"},{icon:"📚",name:"图书馆员/档案管理",reason:"稳定清静，低欲望最适配"},{icon:"🍵",name:"茶艺师/茶叶店",reason:"慢节奏，低欲望，与世无争"},{icon:"🧘",name:"冥想/瑜伽老师",reason:"精神修养，淡泊名利"},{icon:"🌿",name:"花艺师/园艺师",reason:"与植物为伴，简单生活"}] },
  "ISTPA": { name:"老黄牛", tagline:"埋头干活不说话", desc:"埋头干活不说话，卷是默默卷。你不求关注，只求结果。别人不知道你在卷，但成果说明一切。你是团队里最可靠的那个人——交给你的任务从来不操心，你总能按时按质完成。但要注意，默默干活也要学会适当的展示和汇报——职场中「做了事但不让人知道」和「没做事」在很多人眼里是没有区别的。另外，你的低调有时候会变成晋升的障碍——当领导都不确定你是不是那个最努力的人时，升职加薪可能就会忘记你。在感情中你是默默付出型，但别让对方觉得一切都是理所当然——偶尔的撒娇和索要回报，能让关系更平衡。", traits:[{t:"老黄牛",c:"#F39C12"},{t:"靠谱",c:"#27AE60"},{t:"低调",c:"#00BCD4"},{t:"执行强",c:"#0097A7"}], careers:[{icon:"🏭",name:"生产管理/质量管理",reason:"默默把控每个细节"},{icon:"🔧",name:"供应链/物流管理",reason:"可靠执行，零出错率"},{icon:"💊",name:"医药/实验技术员",reason:"耐心严谨，重复工作也能做好"},{icon:"🖥️",name:"运维/DevOps工程师",reason:"后台守护者，默默维稳"},{icon:"📐",name:"建筑/工程监理",reason:"监督质量，不说话只做事"}] },
  "ISTPC": { name:"守望者", tagline:"默默守护稳稳输出", desc:"默默守护稳稳输出，你是那个永远靠谱的人。不说硬话，不做软事，但关键时刻从不缺席。你是朋友圈里最可靠的后盾——朋友有事只要你力所能及，一定第一时间出现。但你的靠谱有时候会被人当成理所当然，要学会对不合理的要求说不。你的守护欲是优点，但也要分清界限——不是所有人、所有事都值得你守护。在感情中你是最稳定的依靠，但别让对方觉得你是「不用珍惜」的存在——适度的不可得性反而能让关系更健康发展。", traits:[{t:"守护",c:"#00BCD4"},{t:"靠谱",c:"#0097A7"},{t:"稳定",c:"#00ACC1"},{t:"低调",c:"#00838F"}], careers:[{icon:"👨‍⚕️",name:"医生/药剂师",reason:"守护健康，关键时刻顶得上"},{icon:"🏦",name:"银行风控/柜员",reason:"靠谱稳定，守护每一分钱"},{icon:"👩‍🏫",name:"教师/教务管理",reason:"稳定输出，守护学生成长"},{icon:"🛡️",name:"安保/物业管理",reason:"守护一方平安"},{icon:"📞",name:"客服主管/售后管理",reason:"靠谱处理每一个客户问题"}] },
  "ISTFA": { name:"内卷乐", tagline:"卷并快乐着", desc:"卷并快乐着，这是你的超能力。别人卷是痛苦，你卷是享受。你是那种让同事感到压力的卷王（褒义）。但要注意，你的卷如果影响了团队的整体氛围，可能会造成不必要的竞争压力。真正的领导力不是卷死同事，而是带着团队一起变强。另外，你的自我驱动能力如果能学会借助团队的力量，可以创造出远超个人的成就。在感情中你是那种「我很忙但我享受」的状态，但别让忙碌成为忽略对方的借口——陪伴的质量比时长更重要。", traits:[{t:"内卷",c:"#F39C12"},{t:"自驱",c:"#E67E22"},{t:"高效",c:"#D35400"},{t:"享受",c:"#27AE60"}], careers:[{icon:"💻",name:"互联网产品/运营",reason:"卷赢同龄人，靠的是享受"},{icon:"📊",name:"四大会计师事务所",reason:"忙季卷到飞起，但你享受其中"},{icon:"⚖️",name:"律师/法务顾问",reason:"案子堆成山，赢才是乐趣"},{icon:"🏥",name:"住院医师/规培生",reason:"学医就是终身卷，但你甘之如饴"},{icon:"📈",name:"投资银行分析师",reason:"卷天卷地，薪资是对卷的补偿"}] },
  "ISTFC": { name:"独行躺王", tagline:"表面躺实际卷", desc:"表面躺实际卷，你是隐藏王者。看起来与世无争，背地里疯狂努力。你是卷王中的伪装者，也是最被低估的那种人。但要注意，你的「躺」如果被不了解你的人当真，可能会错失一些机会——适当的展示和表达自己，是被你忽略但很重要的一课。另外，你的这种反差风格如果用在正确的领域，可以成为独特的个人品牌——「看起来不努力其实最努力」，这是一种很有人格魅力的反差。在感情中你是最会隐藏真实状态的一方，但别让对方觉得完全看不透你——偶尔的真实流露能让关系更亲近。", traits:[{t:"伪装",c:"#7C3AED"},{t:"躺王",c:"#A78BFA"},{t:"隐藏卷",c:"#8B5CF6"},{t:"反差",c:"#6D28D9"}], careers:[{icon:"🎭",name:"咨询师/战略顾问",reason:"看起来在聊天，实际在解决问题"},{icon:"🧙",name:"神秘学/塔罗/命理师",reason:"人设神秘，背地里很努力"},{icon:"🎮",name:"职业选手/代练",reason:"表面娱乐玩家，实际卷王一枚"},{icon:"📸",name:"狗仔/娱乐记者",reason:"低调跟踪，暗中收集情报"},{icon:"🔍",name:"商业情报/竞调分析师",reason:"默默调研，表面云淡风轻"}] },
  "ISNPA": { name:"策划人", tagline:"暗中观察谋划一切", desc:"暗中观察谋划一切，你是朋友圈的军师。不出手则已，出手就是王炸。思想是你最锋利的武器。你是天生的策划者——在别人还在想「做什么」的时候，你已经在想「怎么做」了。但要注意，你的计划如果一直停留在脑子里而没有执行，就永远只是想法。学会把计划变成行动，是从「军师」到「统帅」的关键一步。另外，你的洞察力如果用在正确的方向，可以做出非常了不起的判断和决策。在感情中你是默默出主意的一方，但别让对方觉得所有事情都是ta在做决定——适度的强势和主动，能让你们的关系更平等。", traits:[{t:"策划",c:"#E67E22"},{t:"谋士",c:"#F39C12"},{t:"洞察",c:"#D35400"},{t:"幕后",c:"#C0392B"}], careers:[{icon:"📋",name:"战略咨询师",reason:"出谋划策，影响企业决策"},{icon:"🎬",name:"编剧/导演",reason:"幕后策划，讲故事的高手"},{icon:"📊",name:"市场研究/行业分析师",reason:"洞察先机，掌握行业规律"},{icon:"🧩",name:"产品经理",reason:"策划产品，定义方向"},{icon:"🔮",name:"天使投资人",reason:"看人看项目，洞察未来趋势"}] },
  "ISNPC": { name:"冷面刚", tagline:"社恐但硬刚", desc:"社恐但硬刚，不鸣则已一鸣惊人。你不是不会社交，只是不想社交。真到关键时刻，你是那个站出来的人。你把所有的社交能量都留给了真正重要的人和事，这是非常成熟的做法。但要注意，社恐不是你逃避所有社交的借口——必要的职场社交、客户沟通还是要做到的。另外，你的「冷面」有时候会让人误会你是高冷或者不屑于与人交流，实际上你只是不想说话而已。在感情中你是外冷内热型，但别让对方误解你的沉默——主动表达是破解误会的最好方式。", traits:[{t:"冷面",c:"#2980B9"},{t:"硬刚",c:"#1A5276"},{t:"社恐",c:"#3498DB"},{t:"关键时刻",c:"#E74C3C"}], careers:[{icon:"🖥️",name:"网络安全工程师",reason:"技术硬核，不需要太多社交"},{icon:"🔬",name:"研究员/博士",reason:"学术圈，社恐是常态"},{icon:"🎨",name:"原画师/插画师",reason:"用作品说话，不需要嘴皮子"},{icon:"🧪",name:"药品研发/生物技术",reason:"实验为主，社恐适配"},{icon:"📊",name:"数据科学家",reason:"分析数据，解决复杂问题"}] },
  "ISNFA": { name:"独处达人", tagline:"独处且快乐", desc:"独处且快乐，孤独是你的好朋友。一个人吃饭旅行到处走停停，你是自己最好的陪伴。你拥有一种非常珍贵的品质——完全自洽的独处能力。在这个充满焦虑的时代，你能享受独处本身就是一种巨大的心理健康优势。但要注意，独处的快乐不应该变成社交退缩的借口——人是社会性动物，完全脱离群体会让你失去一些只有人际关系才能带来的幸福感。学会主动社交，而不是被动等待，是你的成长方向。在感情中你是最不会感到孤独的一方，但别让对方觉得你「一个人也过得很好，不需要我」——适当的依赖能让对方感到被需要。", traits:[{t:"独处",c:"#00BCD4"},{t:"自洽",c:"#00838F"},{t:"自由",c:"#00ACC1"},{t:"独立",c:"#0097A7"}], careers:[{icon:"✈️",name:"旅行自媒体/博主",reason:"一个人上路，记录全世界"},{icon:"📚",name:"独立作家/写手",reason:"独处是灵感来源，创作必备"},{icon:"🎸",name:"独立音乐制作人",reason:"一个人就是一个乐队"},{icon:"🎨",name:"艺术家/画廊主理",reason:"独处创作，艺术需要孤独"},{icon:"🧘",name:"冥想/禅修导师",reason:"精神探索，独处即修行"}] },
  "INFLC": { name:"淡定王者", tagline:"什么都与我无关", desc:"什么都与我无关，你是最淡定的人。大事小事在你眼里都是小事，天塌不塌先看有没有砸到我。你是朋友圈里心态最好的那个——没有之一。但要注意，淡定和冷漠只有一线之隔。真正的心态好是「我能接受所有结果」而不是「我不在乎任何结果」。学会在淡定和在乎之间找到平衡，是你的必修课。另外，你的这种淡定如果被误解为「没有热情」，可能会在职场和社交中吃亏——适当的表现出在乎和热情，是社交的必要组成。在感情中你是最不容易焦虑的一方，但别让对方觉得你对这段关系无所谓——主动表达关心是在乎的最直接方式。", traits:[{t:"淡定",c:"#95A5A6"},{t:"冷漠",c:"#7F8C8D"},{t:"稳定",c:"#ABB7B7"},{t:"抽离",c:"#BDC3C7"}], careers:[{icon:"🏔️",name:"户外/极限运动教练",reason:"淡定应对各种突发状况"},{icon:"🆘",name:"急救医生/救援人员",reason:"紧急情况下保持绝对冷静"},{icon:"🧘",name:"心理咨询师/治疗师",reason:"情绪的容器，淡定是基本功"},{icon:"🏛️",name:"公务员/窗口服务",reason:"每天面对各种，淡定以对"},{icon:"🌊",name:"出海船员/潜水教练",reason:"大海面前，保持淡定才能保命"}] },
  "INTPA": { name:"卷神", tagline:"最高级的卷", desc:"最高级的卷，卷到无怨无悔。你是那种让猎头都头疼的人才，因为没有合适的职位能跟上你的节奏。你的卷是全方位的——思维、行动、结果，每一环节都追求极致。但要注意，卷神也有疲惫的一天——学会在高速运转中给自己喘息的机会，是可持续卷的前提。另外，你的极致追求如果能学会借助团队的力量，可以创造出远超个人的成就——一个人的极致有上限，团队的极致无上限。在感情中你是高标准型，但别让高标准成为关系的负担——完美主义是关系的隐形杀手。", traits:[{t:"卷神",c:"#E74C3C"},{t:"极致",c:"#C0392B"},{t:"高目标",c:"#FF5252"},{t:"自驱",c:"#FF6B6B"}], careers:[{icon:"🏆",name:"职业运动员",reason:"竞技场是卷神的舞台"},{icon:"💰",name:"金融/投行顶级交易员",reason:"用极限挑战换取极限回报"},{icon:"🎓",name:"名校研究生/博士",reason:"卷进顶尖学府是卷神的勋章"},{icon:"🚀",name:"创业者/CEO",reason:"创业是最高级别的卷"},{icon:"🏅",name:"奥运选手/竞技选手",reason:"更高更快更强，卷神的极致追求"}] },
  "INTPC": { name:"思想钢印", tagline:"我认为对的就是对的", desc:"我认为对的就是对的，这是你的信条。信念坚定不动摇，你是行走的价值观，所见之处皆是你的领地。但要注意，信念坚定和固执只有一线之隔。真正的成长型思维是「我可以坚持我的观点，但我也愿意听听不同的声音」。学会在坚持和开放之间找到平衡，是思想钢印持有者最重要的课题。另外，你的坚定如果用在推动正向改变上，可以成为改变世界的力量——很多推动社会进步的人，都是有坚定信念的思想钢印患者。在感情中你是最坚持自己方式的一方，但别让「我的方式最好」变成关系的绊脚石——学会欣赏对方的方式，也是一种智慧。", traits:[{t:"固执",c:"#8E44AD"},{t:"信念",c:"#9B59B6"},{t:"坚定",c:"#A569BD"},{t:"原则",c:"#7D3C98"}], careers:[{icon:"⚖️",name:"法官/仲裁员",reason:"坚定法律信仰，维护公平正义"},{icon:"🏛️",name:"政治家/政策制定者",reason:"信念驱动，改变国家走向"},{icon:"📣",name:"社会活动家",reason:"坚定信念，推动社会变革"},{icon:"📚",name:"学者/大学教授",reason:"学术理想，坚守研究底线"},{icon:"🛡️",name:"人权律师",reason:"为正义辩护，信念不动摇"}] },
  "INTFA": { name:"理想主义者", tagline:"内心戏很多", desc:"内心戏很多，理想很丰满。你活在自己构建的完美世界里，并为此默默努力。理想主义是你的翅膀。但要注意，理想主义如果脱离现实，就是空想。你的内心世界如此丰富，是创作和创意的源泉，但如果不能落地，就是空中楼阁。学会把理想变成可执行的计划，是理想主义者最重要的成长方向。另外，你的理想如果能找到现实的支点，可以创造出真正有价值的创新——很多伟大的产品都源于理想主义者的「如果世界可以这样」。在感情中你是最有浪漫情怀的一方，但别让理想化的期待变成对对方的压力——接受对方真实的样子，而不是你想象中的样子。", traits:[{t:"理想",c:"#16A085"},{t:"内戏",c:"#1ABC9C"},{t:"浪漫",c:"#27AE60"},{t:"纯粹",c:"#2ECC71"}], careers:[{icon:"🎬",name:"导演/编剧/艺术家",reason:"理想主义是创作的燃料"},{icon:"🏗️",name:"社会创业者",reason:"用商业手段解决社会问题"},{icon:"🌍",name:"环保/公益组织创始人",reason:"理想主义驱动，改变世界"},{icon:"📖",name:"作家/诗人",reason:"内心戏变成文字，影响千万人"},{icon:"💡",name:"产品创新顾问",reason:"想象未来的产品形态"}] },
  "INTFC": { name:"摆烂大师", tagline:"想卷但躺着更舒服", desc:"想卷但躺着更舒服，这是你的人生。明日复明日，明日还明日。你是摆烂界的大师，领军人物。但要注意，摆烂应该是主动的选择，而不是被动的逃避——真正高级的摆烂是「我看透了我选择躺」，而不是「我卷不动了我被迫躺」。另外，摆烂虽爽，但别让摆烂成为所有事情的借口——在你真正在乎的事情上，还是要全力以赴。在感情中你是最不会制造压力的一方，但别让对方觉得你对未来没有任何规划——偶尔对未来的讨论和承诺，是关系稳定的信号。", traits:[{t:"摆烂",c:"#95A5A6"},{t:"拖延",c:"#7F8C8D"},{t:"自洽",c:"#ABB7B7"},{t:"淡定",c:"#BDC3C7"}], careers:[{icon:"🛏️",name:"酒店试睡员/旅行体验师",reason:"摆烂也能赚钱的职业典范"},{icon:"📷",name:"佛系博主/生活达人",reason:"人设立住了，摆烂也是人设"},{icon:"☕",name:"咖啡馆常客/探店博主",reason:"日常摆烂，发现城市好去处"},{icon:"🎮",name:"游戏代练/陪玩",reason:"躺着赚钱，玩就是工作"},{icon:"🐱",name:"宠物博主/萌宠达人",reason:"撸猫撸狗，顺便把钱赚了"}] },
  "INNPA": { name:"大V", tagline:"影响力玩家", desc:"影响力玩家，粉丝就是力量。你深谙传播之道，每一条内容都是精心计算。网红经济，你是最认真的玩家。你是把个人影响力变现的高手——在这个时代，影响力就是资产。但要注意，影响力的副作用是容易让人忘记真实的自己——粉丝喜欢的是你展示的那个人设，但真正爱你的人应该接受真实的你。另外，不要被流量绑架——真正有价值的影响力不是有多少粉丝，而是你的内容能帮助多少人。在感情中你是高调型，但别让「展示」变成了关系的全部——真实的生活和感情不需要表演。", traits:[{t:"大V",c:"#E91E63"},{t:"影响力",c:"#C2185B"},{t:"网红",c:"#F06292"},{t:"流量",c:"#EC407A"}], careers:[{icon:"📱",name:"头部博主/带货主播",reason:"影响力变现，年入千万不是梦"},{icon:"🎬",name:"内容总监/MCN创始人",reason:"从博主到公司，创建流量帝国"},{icon:"📣",name:"品牌战略顾问",reason:"影响力即商业价值"},{icon:"🎯",name:"个人品牌咨询师",reason:"帮人设打造个人品牌"},{icon:"💎",name:"高端品牌代言人",reason:"顶级影响力，顶级变现"}] },
  "INNPC": { name:"互联网嘴替", tagline:"你想说的正是大家想说的", desc:"专业嘴替，你想说的正是大家想说而不敢说的。你的评论区永远比正文精彩，你是互联网嘴替第一人。你是互联网时代最稀缺的内容创作者——你代表的是沉默的大多数的声音。但要注意，嘴替也需要有底线——不是所有博眼球的话都值得说，有些话说了会伤害到特定群体。另外，你的敢说如果能加上深度和建设性，就不只是嘴替而是意见领袖了。在感情中你是最敢表达的一方，但别把「敢说」变成了「不会说话」——表达方式和内容一样重要。", traits:[{t:"嘴替",c:"#C2185B"},{t:"敢说",c:"#E91E63"},{t:"尖锐",c:"#AD1457"},{t:"真实",c:"#D81B60"}], careers:[{icon:"✍️",name:"时事评论员/博主",reason:"说出别人想说不敢说的话"},{icon:"🎤",name:"脱口秀演员",reason:"嘴替是脱口秀的核心技能"},{icon:"📣",name:"危机公关专家",reason:"敢说会扳，善用舆论力量"},{icon:"🎬",name:"吐槽视频博主",reason:"互联网嘴替，娱乐至上的评论"},{icon:"💬",name:"社群运营/KOL",reason:"活跃气氛，说出群体心声"}] },
  "INNFA": { name:"彩虹屁", tagline:"自我感觉超级好", desc:"自我感觉超级好，你是自己的第一粉丝。自信爆棚的你，每一天都在给自己打气。自信是最好的医美。你是朋友圈里最自洽的那个——不是自卑也不是自负，而是健康的自我认可。但要注意，自信过头会变成自恋——自我感觉超级好不代表别人也要觉得你超级好，学会接受别人有自己的判断。另外，你的自信如果建立在真实的成就而非虚假的自我之上，就是最强大的武器。在感情中你是最有魅力的一方，但别让「自恋」变成对方的压力——真正的自信是接受对方也有自己的价值。", traits:[{t:"自信",c:"#F39C12"},{t:"彩虹屁",c:"#E67E22"},{t:"自恋",c:"#D35400"},{t:"乐观",c:"#F1C40F"}], careers:[{icon:"💄",name:"美妆博主/时尚达人",reason:"自信是最好的妆容"},{icon:"🏋️", name:"健身博主/体态教练",reason:"自信是最好的塑形"},{icon:"🎤",name:"主持人/司仪",reason:"自信hold住全场"},{icon:"💼",name:"演讲教练/培训师",reason:"自信传染，自信传递"},{icon:"🎭",name:"演员/表演者",reason:"舞台需要绝对的自信"}] },
  "INNFC": { name:"互联网隐士", tagline:"我不想理你", desc:"我不想理你，也不想跟你解释。低质量社交是我最讨厌的事。你是互联网里的隐士，爱看不看。你活在自己构建的小宇宙里，不被外界的评价体系所左右。这是非常难得的品质——能真正做到「不活在别人的目光里」的人少之又少。但要注意，互联网隐士不应该是社恐的借口——如果你是因为害怕社交而选择隐士，那这不是真正的高冷而是在逃避。真正的隐士是「我可以选择社交，但我选择不」，而不是「我不敢社交所以我隐士」。在感情中你是最独立的一方，但别让「我不想解释」变成沟通的障碍——好的关系需要解释和表达。", traits:[{t:"隐士",c:"#7F8C8D"},{t:"高冷",c:"#95A5A6"},{t:"独立",c:"#ABB7B7"},{t:"淡漠",c:"#BDC3C7"}], careers:[{icon:"🖥️",name:"独立开发者/黑客",reason:"技术宅不需要社交"},{icon:"📚",name:"电子书/知识付费创作者",reason:"一个人做内容，不用抛头露面"},{icon:"🎨",name:"数字艺术/NFT创作者",reason:"作品即身份，不需要本人出镜"},{icon:"🔐",name:"区块链/加密行业从业者",reason:"匿名精神，加密文化的践行者"},{icon:"🎮",name:"游戏制作人/独立游戏开发者",reason:"作品说话，开发者不需要社交"}] },

// ===== STATE =====
var answers = [];
var curQ = 0;

document.getElementById('startBtn').addEventListener('click', startTest);
document.getElementById('shareBtn').addEventListener('click', shareResult);
document.getElementById('replayBtn').addEventListener('click', function() { location.reload(); });

function startTest() {
  answers = []; curQ = 0;
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('question-screen').classList.add('active');
  showQ();
}

function showQ() {
  var q = QS[curQ];
  var dim = DIMS[q.d];
  document.getElementById('qNum').textContent = curQ + 1;
  document.getElementById('dimLabel').textContent = dim.name;
  document.getElementById('progFill').style.width = ((curQ + 1) / QS.length * 100).toFixed(2) + '%';
  document.getElementById('qText').textContent = q.q;
  var optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = '';
  for (var i = 0; i < q.a.length; i++) {
    var opt = q.a[i];
    var btn = document.createElement('button');
    btn.className = 'q-opt';
    btn.innerHTML = '<span class="q-opt-letter">' + opt.l + '</span><span>' + opt.t + '</span>';
    (function(idx) {
      btn.addEventListener('click', function() { pick(idx); });
    })(i);
    optsEl.appendChild(btn);
  }
  var card = document.getElementById('qCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn 0.3s ease';
}

function pick(idx) {
  answers.push(idx === 0 ? 'A' : 'B');
  curQ++;
  if (curQ < QS.length) {
    showQ();
  } else {
    showResult();
  }
}

function calcType() {
  var dimScores = [0,0,0,0,0];
  for (var i = 0; i < QS.length; i++) {
    dimScores[QS[i].d] += (answers[i] === 'A') ? 1 : 0;
  }
  var letters = [
    dimScores[0] >= 3 ? 'E' : 'I',
    dimScores[1] >= 3 ? 'S' : 'N',
    dimScores[2] >= 3 ? 'T' : 'F',
    dimScores[3] >= 3 ? 'J' : 'P',
    dimScores[4] >= 3 ? 'A' : 'C',
  ];
  return { key: letters.join(''), dimScores: dimScores };
}

function showResult() {
  document.getElementById('question-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  var result = calcType();
  var t = TYPES[result.key] || TYPES['INTFC'];

  document.getElementById('resBadge').textContent = result.key;
  document.getElementById('resName').textContent = t.name;
  document.getElementById('resTagline').textContent = t.tagline;
  document.getElementById('resDesc').textContent = t.desc;

  // Traits
  var chipsEl = document.getElementById('resChips');
  var chipsHtml = '';
  for (var i = 0; i < t.traits.length; i++) {
    var tr = t.traits[i];
    chipsHtml += '<span class="trait-chip" style="color:' + tr.c + ';border-color:' + tr.c + '">' + tr.t + '</span>';
  }
  chipsEl.innerHTML = chipsHtml;

  // Career
  var careerEl = document.getElementById('careerList');
  var careerHtml = '';
  for (var j = 0; j < t.careers.length; j++) {
    var c = t.careers[j];
    careerHtml += '<div class="career-item"><span class="c-icon">' + c.icon + '</span><span><span class="c-name">' + c.name + '</span> <span class="c-reason">' + c.reason + '</span></span></div>';
  }
  careerEl.innerHTML = careerHtml;
}

function shareResult() {
  var result = calcType();
  var t = TYPES[result.key] || TYPES['INTFC'];
  var text = '我的赛博人格：【' + result.key + ' · ' + t.name + '】\n"' + t.tagline + '"\n' + t.desc.substring(0, 100) + '...\n\n#赛博人格测试 #SBTI\nhttps://caoxianhuang-creator.github.io/sbti/';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('shareBtn');
      btn.textContent = '✅ 已复制！快去粘贴';
      setTimeout(function() { btn.textContent = '📤 复制结果发给好友'; }, 2500);
    });
  } else {
    prompt('复制这段文字：', text);
  }
}
</script>
