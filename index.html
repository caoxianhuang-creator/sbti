<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博人格测试 SBTI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0D0D;
      --card: #1A1A2E;
      --card2: #16162A;
      --primary: #FF2D55;
      --secondary: #00D4FF;
      --accent: #FFD93D;
      --purple: #A855F7;
      --green: #22C55E;
      --text: #FFFFFF;
      --text-dim: #8B8B9A;
      --border: #2A2A3E;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
    @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    @keyframes shimmer { 0%{background-position:-200%} 100%{background-position:200%} }

    /* ===== SHARED ===== */
    .container { width: 100%; max-width: 520px; padding: 0 20px; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.4s ease; }
    .pill-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }

    /* ===== START SCREEN ===== */
    #start-screen { text-align: center; padding: 32px 20px; animation: fadeUp 0.6s ease; }
    .logo-row { margin-bottom: 28px; }
    .logo-icon { font-size: 48px; margin-bottom: 12px; }
    .logo-sub { font-size: 11px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }
    .main-title { font-size: clamp(44px, 12vw, 64px); font-weight: 900; line-height: 1; margin-bottom: 8px; }
    .title-sbti { background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .title-year { font-size: 16px; color: var(--text-dim); font-weight: 400; }
    .subtitle { font-size: 15px; color: var(--text-dim); margin: 20px 0 36px; line-height: 1.7; }
    .start-btn {
      padding: 16px 56px; background: linear-gradient(135deg, var(--primary), #FF6B8A);
      color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(255,45,85,0.35);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,45,85,0.5); }
    .start-btn:active { transform: scale(0.97); }
    .stats-row { display: flex; justify-content: center; gap: 32px; margin-top: 36px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--secondary); }
    .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .disclaimer { margin-top: 28px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    /* ===== QUESTION SCREEN ===== */
    #question-screen { padding: 24px 20px 40px; }
    .q-progress { margin-bottom: 28px; }
    .q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .q-counter { font-size: 13px; color: var(--text-dim); }
    .q-counter span { color: var(--primary); font-weight: 700; }
    .q-dim-label { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--card); color: var(--text-dim); }
    .progress-track { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 2px; transition: width 0.4s ease; }
    .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 36px 24px; animation: slideIn 0.3s ease; }
    .q-text { font-size: 19px; font-weight: 600; line-height: 1.55; margin-bottom: 28px; }
    .q-opts { display: flex; flex-direction: column; gap: 10px; }
    .q-opt {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 14px; color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; text-align: left;
    }
    .q-opt:hover { border-color: var(--primary); background: #1E1E38; transform: translateX(3px); }
    .q-opt:active { transform: scale(0.98); }
    .q-opt-letter {
      width: 30px; height: 30px; border-radius: 8px; background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0; transition: background 0.2s;
    }
    .q-opt:hover .q-opt-letter { background: var(--primary); }

    /* ===== RESULT SCREEN ===== */
    #result-screen { padding: 28px 20px 48px; text-align: center; animation: fadeIn 0.5s ease; }
    .result-badge { animation: fadeUp 0.5s ease 0.1s both; }
    .result-eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
    .result-type-badge {
      display: inline-block; padding: 8px 24px; border-radius: 16px;
      font-size: 14px; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      margin-bottom: 8px;
    }
    .result-main-type {
      font-size: clamp(64px, 18vw, 88px); font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent), var(--secondary));
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite; margin: 8px 0;
    }
    .result-name { font-size: 26px; font-weight: 800; color: var(--secondary); margin-bottom: 6px; }
    .result-tagline { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.6; }
    .result-divider { width: 60px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 2px; margin: 0 auto 24px; }

    /* 15 Dimensions */
    .dims-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: left; animation: fadeUp 0.5s ease 0.2s both; }
    .dims-title { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
    .dims-grid { display: grid; grid-template-columns: 1fr 1px 1fr; gap: 0 16px; }
    .dim-item { margin-bottom: 14px; }
    .dim-name { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: flex; justify-content: space-between; }
    .dim-name span { color: var(--text); font-weight: 600; }
    .dim-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .dim-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
    .dim-sep { background: var(--border); width: 1px; }

    /* Description card */
    .desc-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: left; animation: fadeUp 0.5s ease 0.3s both; }
    .desc-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }
    .desc-text { font-size: 14px; color: var(--text-dim); line-height: 1.8; }
    .trait-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .trait-chip {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid; transition: all 0.2s;
    }

    /* Compatibility */
    .compat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: left; animation: fadeUp 0.5s ease 0.4s both; }
    .compat-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--purple); }
    .compat-items { display: flex; flex-direction: column; gap: 8px; }
    .compat-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-dim); }
    .compat-icon { font-size: 16px; }
    .compat-type { font-weight: 800; color: var(--text); }

    /* Share */
    .share-btn {
      width: 100%; padding: 16px; background: linear-gradient(135deg, var(--secondary), #0099CC);
      color: white; border: none; border-radius: 16px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,212,255,0.25); margin-bottom: 10px;
    }
    .share-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,212,255,0.4); }
    .replay-btn {
      width: 100%; padding: 14px; background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 16px; font-size: 14px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-bottom: 24px;
    }
    .replay-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .result-footer { font-size: 11px; color: var(--text-dim); line-height: 1.7; }

    @media (max-width: 380px) {
      .dims-grid { grid-template-columns: 1fr; gap: 0; }
      .dim-sep { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== START SCREEN ===== -->
<div id="start-screen" class="screen active">
  <div class="container">
    <div class="logo-row">
      <div class="logo-icon">🤖</div>
      <div class="logo-sub">// 赛博人格测试 //</div>
    </div>
    <div class="main-title">
      <div class="title-sbti">SBTI</div>
      <div class="title-year">2026</div>
    </div>
    <div class="subtitle">
      30道题 · 32种人格 · 互联网嘴替大赏<br>
      你是哪一种牛马？
    </div>
    <button class="start-btn" id="startBtn">开始测试 →</button>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-num">32</div><div class="stat-label">种人格类型</div></div>
      <div class="stat-item"><div class="stat-num">30</div><div class="stat-label">道精选题</div></div>
      <div class="stat-item"><div class="stat-num">15</div><div class="stat-label">维度分析</div></div>
    </div>
    <div class="disclaimer">测试结果纯属娱乐 · 请勿当真 · 认真你就输了<br>本测试原型来自 B站@蛆肉儿串儿</div>
  </div>
</div>

<!-- ===== QUESTION SCREEN ===== -->
<div id="question-screen" class="screen">
  <div class="container">
    <div class="q-progress">
      <div class="q-top">
        <div class="q-counter"><span id="qNum">1</span> / 30</div>
        <div class="q-dim-label" id="dimLabel">能量来源</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progFill" style="width:3.33%"></div></div>
    </div>
    <div class="q-card" id="qCard">
      <div class="q-text" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
  </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen" class="screen">
  <div class="container">
    <div class="result-badge">
      <div class="result-eyebrow">你的赛博人格</div>
      <div class="result-type-badge" id="resBadge">ESTPA</div>
    </div>
    <div class="result-main-type" id="resName">卷王</div>
    <div class="result-tagline" id="resTagline">说做就做，不负当下</div>
    <div class="result-divider"></div>

    <div class="dims-card">
      <div class="dims-title">📊 十五维度（伪）</div>
      <div class="dims-grid" id="dimsGrid"></div>
    </div>

    <div class="desc-card">
      <div class="desc-title">📝 人格解读</div>
      <div class="desc-text" id="resDesc"></div>
      <div class="trait-chips" id="resChips"></div>
    </div>

    <div class="compat-card">
      <div class="compat-title">💞 速配人格</div>
      <div class="compat-items" id="compatList"></div>
    </div>

    <button class="share-btn" id="shareBtn">📤 复制结果发给好友</button>
    <button class="replay-btn" id="replayBtn">↻ 再测一次</button>
    <div class="result-footer">
      本测试仅供娱乐 · 认真你就输了<br>
      欢迎分享给冤种朋友们 · @蛆肉儿串儿
    </div>
  </div>
</div>

<script>
// ===== DIMENSIONS =====
const DIMS = [
  { name: '能量来源', dimA: '输出型 E', dimB: '囤积型 I', letter: 'EI' },
  { name: '信息获取', dimA: '观察者 S', dimB: '直觉者 N', letter: 'SN' },
  { name: '决策方式', dimA: '理性派 T', dimB: '感觉派 F', letter: 'TF' },
  { name: '生活态度', dimA: '计划派 J', dimB: '随性派 P', letter: 'JP' },
  { name: '应对姿态', dimA: '硬刚型 A', dimB: '摆烂型 C', letter: 'AC' },
  { name: '社交模式', dimA: '社牛 S', dimB: '社恐 N', letter: 'SN2' },
  { name: '情绪底色', dimA: '乐观派 O', dimB: '焦虑派 A', letter: 'OA' },
  { name: '成就导向', dimA: '卷王 H', dimB: '躺平 L', letter: 'HL' },
];

const DIM_COLORS = ['#FF2D55','#00D4FF','#FFD93D','#A855F7','#22C55E','#FF9F1C','#EC4899','#0EA5E9'];

// ===== QUESTIONS =====
const QS = [
  // D0: EI - 能量来源
  { d:0, q:"周末你通常在干嘛？", a:[{l:"A",t:"出门浪，见人，充电"},{l:"B",t:"在家躺着，哪也不去"}] },
  { d:0, q:"聊天时你是先打字还是等对方回？", a:[{l:"A",t:"我先开口，主动破冰"},{l:"B",t:"等对方先说，我再接"}] },
  { d:0, q:"一个人待久了你会？", a:[{l:"A",t:"想出门找点事做"},{l:"B",t:"享受独处的快乐"}] },
  { d:0, q:"在聚会上你通常是？", a:[{l:"A",t:"气氛发动机，大家围着我转"},{l:"B",t:"角落里默默观察的存在"}] },
  { d:0, q:"你的工作动力主要来自？", a:[{l:"A",t:"跟人互动碰撞出火花"},{l:"B",t:"一个人安静思考的满足感"}] },
  { d:0, q:"说到「周末计划」，你更常的状态是？", a:[{l:"A",t:"已经约了一堆人"},{l:"B",t:"还没想好，看心情"}] },

  // D1: SN - 信息获取
  { d:1, q:"你看人主要看什么？", a:[{l:"A",t:"做了什么事，说了什么话"},{l:"B",t:"感觉和气场，直觉告诉我TA是怎样的人"}] },
  { d:1, q:"你更关注？", a:[{l:"A",t:"眼前的实际细节"},{l:"B",t:"未来的可能性和想象"}] },
  { d:1, q:"老板布置任务时你更想了解？", a:[{l:"A",t:"具体的执行步骤和时间节点"},{l:"B",t:"为什么做这件事，意义是什么"}] },
  { d:1, q:"面对一个新项目你的开场是？", a:[{l:"A",t:"先研究现有资料和案例"},{l:"B",t:"先想象它做成了会是什么样"}] },
  { d:1, q:"朋友跟你抱怨事情，你更常的反应是？", a:[{l:"A",t:"给具体的解决方案"},{l:"B",t:"理解情绪，共情TA的不爽"}] },
  { d:1, q:"你喜欢什么样的内容？", a:[{l:"A",t:"实操干货，有步骤有方法"},{l:"B",t:"有深度的分析和洞察"}] },

  // D2: TF - 决策方式
  { d:2, q:"你更看重？", a:[{l:"A",t:"这件事是不是合理、说得通"},{l:"B",t:"大家的感受和氛围怎么样"}] },
  { d:2, q:"发生冲突时你倾向于？", a:[{l:"A",t:"先讲道理，分清对错"},{l:"B",t:"先照顾情绪，回头再算账"}] },
  { d:2, q:"你更愿意被形容为？", a:[{l:"A",t:"理性、冷静、有逻辑"},{l:"B",t:"温暖、善解人意、有同理心"}] },
  { d:2, q:"做决定时你会？", a:[{l:"A",t:"分析利弊，客观评估"},{l:"B",t:"考虑人的感受，哪个更让大家好受"}] },
  { d:2, q:"你更认可的成功是？", a:[{l:"A",t:"解决了多少问题，创造了多少价值"},{l:"B",t:"影响了多少人，带来了多少温暖"}] },
  { d:2, q:"当朋友问「我该怎么办」时你通常？", a:[{l:"A",t:"给出最优解和执行路径"},{l:"B",t:"陪伴倾听，让他自己想清楚"}] },

  // D3: JP - 生活态度
  { d:3, q:"你的办公桌通常是什么状态？", a:[{l:"A",t:"整齐有序，什么都在该在的位置"},{l:"B",t:"乱中有序，我知道我的东西在哪"}] },
  { d:3, q:"出门前你通常会？", a:[{l:"A",t:"提前计划好一切，可能还做了预案"},{l:"B",t:"看情况，到时候再说"}] },
  { d:3, q:"你更接近哪种工作风格？", a:[{l:"A",t:"提前列好清单，一件一件打勾完成"},{l:"B",t:"喜欢多线程推进，弹性工作"}] },
  { d:3, q:"你对「最后期限」的看法是？", a:[{l:"A",t:"提前完成，不能拖到最后一秒"},{l:"B",t:"最后一天才是生产力巅峰"}] },
  { d:3, q:"周一早上你的状态？", a:[{l:"A",t:"斗志满满，列好本周计划"},{l:"B",t:"能呼吸就不错了，边走边看"}] },
  { d:3, q:"旅行时你更喜欢？", a:[{l:"A",t:"攻略详细，行程满满"},{l:"B",t:"睡到自然醒，随性漫游"}] },

  // D4: AC - 应对姿态
  { d:4, q:"遇到麻烦你第一反应是？", a:[{l:"A",t:"正面刚，马上解决"},{l:"B",t:"先放一放，说不定自己就好了"}] },
  { d:4, q:"别人对你的评价通常是？", a:[{l:"A",t:"靠谱、能扛事、硬核"},{l:"B",t:"随和、不计较、心大"}] },
  { d:4, q:"面对困难的任务你的态度是？", a:[{l:"A",t:"迎难而上，搞不定不罢休"},{l:"B",t:"差不多就行了，不必太较真"}] },
  { d:4, q:"你更常的状态是？", a:[{l:"A",t:"战斗模式，随时备战"},{l:"B",t:"和平模式，能不动就不动"}] },
  { d:4, q:"遇到不合理的事你会？", a:[{l:"A",t:"当场指出，立刻表达不满"},{l:"B",t:"算了算了，多一事不如少一事"}] },
  { d:4, q:"你的抗压方式是？", a:[{l:"A",t:"主动出击改变现状"},{l:"B",t:"调整心态接受现实"}] },
];

// ===== 32 TYPES =====
const TYPES = {

// ===== STATE =====
let answers = []; // array of 'A' or 'B'
let curQ = 0;

document.getElementById('startBtn').addEventListener('click', startTest);
document.getElementById('shareBtn').addEventListener('click', shareResult);
document.getElementById('replayBtn').addEventListener('click', () => location.reload());

function startTest() {
  answers = []; curQ = 0;
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('question-screen').classList.add('active');
  showQ();
}

function showQ() {
  const q = QS[curQ];
  const dim = DIMS[q.d];
  document.getElementById('qNum').textContent = curQ + 1;
  document.getElementById('dimLabel').textContent = dim.name;
  document.getElementById('progFill').style.width = ((curQ + 1) / QS.length * 100).toFixed(2) + '%';
  document.getElementById('qText').textContent = q.q;
  const optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = '';
  q.a.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-opt';
    btn.innerHTML = `<span class="q-opt-letter">${opt.l}</span><span>${opt.t}</span>`;
    btn.addEventListener('click', () => pick(i));
    optsEl.appendChild(btn);
  });
  // animate
  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideIn 0.3s ease';
}

function pick(idx) {
  answers.push(idx === 0 ? 'A' : 'B');
  curQ++;
  if (curQ < QS.length) {
    showQ();
  } else {
    showResult();
  }
}

function calcType() {
  // Count per dimension (6 questions each)
  // D0-EI, D1-SN, D2-TF, D3-JP, D4-AC, D5-SN2, D6-OA, D7-HL
  const dimScores = [0,0,0,0,0,0,0,0];
  QS.forEach((q, i) => {
    dimScores[q.d] += answers[i] === 'A' ? 1 : 0;
  });
  // Convert to letter
  const letters = [
    dimScores[0] > 3 ? 'E' : 'I',
    dimScores[1] > 3 ? 'S' : 'N',
    dimScores[2] > 3 ? 'T' : 'F',
    dimScores[3] > 3 ? 'J' : 'P',
    dimScores[4] > 3 ? 'A' : 'C',
  ];
  return { key: letters.join(''), dimScores };
}

function showResult() {
  document.getElementById('question-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  const { key, dimScores } = calcType();
  const t = TYPES[key] || TYPES["INTFC"];

  document.getElementById('resBadge').textContent = t.traits[0].t;
  document.getElementById('resName').textContent = t.name;
  document.getElementById('resTagline').textContent = t.tagline;
  document.getElementById('resDesc').textContent = t.desc;

  // Chips
  const chipsEl = document.getElementById('resChips');
  chipsEl.innerHTML = t.traits.map(tr => `<span class="trait-chip" style="color:${tr.c};border-color:${tr.c}">${tr.t}</span>`).join('');

  // 15 dims (show all 8 with A/B labels)
  const dimsGrid = document.getElementById('dimsGrid');
  dimsGrid.innerHTML = '';
  DIMS.forEach((dim, i) => {
    const score = Math.round(dimScores[i] / 6 * 100);
    const isA = score >= 50;
    const leftPct = isA ? score : 100 - score;
    const rightPct = isA ? 100 - score : score;
    const col = DIM_COLORS[i % DIM_COLORS.length];
    dimsGrid.innerHTML += `
      <div class="dim-item">
        <div class="dim-name">${isA ? dim.dimA : dim.dimB}<span>${score}%</span></div>
        <div class="dim-track"><div class="dim-fill" style="width:0%;background:${col}"></div></div>
      </div>
      <div class="dim-sep"></div>
      <div class="dim-item">
        <div class="dim-name" style="justify-content:flex-end">${isA ? dim.dimB : dim.dimA}<span>${100-score}%</span></div>
        <div class="dim-track"><div class="dim-fill" style="width:0%;background:#333"></div></div>
      </div>
    `;
  });

  // Compat
  const compatEl = document.getElementById('compatList');
  compatEl.innerHTML = t.compat.map(c => `
    <div class="compat-item">
      <span class="compat-icon">${c.icon}</span>
      <span class="compat-type">${c.name}</span>
      <span style="color:var(--text-dim)">${c.type}</span>
    </div>
  `).join('');

  // Animate dims after a tick
  setTimeout(() => {
    dimsGrid.querySelectorAll('.dim-fill').forEach((el, i) => {
      const dimIdx = Math.floor(i / 2);
      const score = Math.round(dimScores[dimIdx] / 6 * 100);
      const isLeft = i % 2 === 0;
      const pct = isLeft ? (DIMS[dimIdx] ? (score >= 50 ? score : 100-score : 50) : 50) : (DIMS[Math.floor(i/2)] ? (score >= 50 ? 100-score : score) : 50);
      el.style.width = pct + '%';
    });
  }, 100);
}

function shareResult() {
  const { key } = calcType();
  const t = TYPES[key] || TYPES["INTFC"];
  const text = `我的赛博人格：【${key} · ${t.name}】\n"${t.tagline}"\n${t.desc}\n\n#赛博人格测试 #SBTI\nhttps://caoxianhuang-creator.github.io/sbti/`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✅ 已复制！快去粘贴';
      setTimeout(() => { btn.textContent = '📤 复制结果发给好友'; }, 2500);
    });
  } else {
    prompt('复制这段文字：', text);
  }
}
</script>
